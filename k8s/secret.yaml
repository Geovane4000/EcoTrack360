apiVersion: v1
kind: Secret
metadata:
  name: ecotrack360-secret
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: root
  MONGO_INITDB_ROOT_PASSWORD: examplepassword
  MONGODB_CONNECTION: "mongodb://root:examplepassword@mongo-svc:27017/?authSource=admin"

# If you use a private registry, create the docker-registry secret like below (fill values or create via CI):
# If you use a private registry, you can generate `k8s/regcred.yaml` by running:
#   ./scripts/create-regcred.sh <registry> <username> <password> [namespace]
# The script will create a `k8s/regcred.yaml` manifest that you can apply with:
#   kubectl apply -f k8s/regcred.yaml -n <namespace>
