apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecotrack360-app
  labels:
    app: ecotrack360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecotrack360
  template:
    metadata:
      labels:
        app: ecotrack360
    spec:
      containers:
        - name: ecotrack360
          image: your.registry/ecotrack360:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: MONGODB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: ecotrack360-secret
                  key: MONGODB_CONNECTION
            - name: MONGO_DB_NAME
              value: "EcoTrack360"
            - name: APP_SEED_ON_STARTUP
              value: "true"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecotrack360-app-svc
spec:
  selector:
    app: ecotrack360
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
