services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - esg-net

  app:
    build: .
    image: ${DOCKER_REGISTRY:-local}/${DOCKER_IMAGE:-ecotrack360}:${TAG:-latest}
    depends_on:
      - mongo
    environment:
      ASPNETCORE_URLS: http://+:8080
      MONGODB_CONNECTION: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-EcoTrack360}
      APP_SEED_ON_STARTUP: ${APP_SEED_ON_STARTUP:-true}
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Development}
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - esg-net

volumes:
  mongo-data:

networks:
  esg-net:
    driver: bridge
